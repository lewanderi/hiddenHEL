<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Submit Event — hiddenHEL</title>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared.css">
  <link rel="stylesheet" href="submit.css">

    <!-- Privacy-friendly analytics by Plausible -->
  <script async src="https://plausible.io/js/pa-c7kXuP-SRAc8oWnlVa2xN.js"></script>
  <script>
    window.plausible=window.plausible||function(){(plausible.q=plausible.q||[]).push(arguments)},plausible.init=plausible.init||function(i){plausible.o=i||{}};
    plausible.init()
  </script>

</head>
<body>
  <header>
    <a class="logo" href="/"><img src="media/logo1.png" alt="hiddenHEL" /></a></a>
    <a href="/" class="back-link">Back to map</a>
  </header>

  <main>
    <div class="form-container">
      <h1 class="page-title">Submit an Event</h1>
      <p class="page-desc">Ready to claim your place as Helsinki's top hidden gem?💎</p>

      <form id="submitForm" novalidate>
        <div class="field">
          <label>Event name *</label>
          <input type="text" id="title" placeholder="e.g. Rooftop Vinyl Night" />
          <div class="field-error" id="title-error"></div>
        </div>

        <div class="field">
          <label>Description *</label>
          <textarea id="description" rows="4" placeholder="Tell us briefly what happens at this event..."></textarea>
          <div class="field-error" id="description-error"></div>
        </div>

        <div class="field date-field">
          <label>Date *</label>
          <input type="date" id="date" />
          <div class="field-error" id="date-error"></div>
        </div>

        <div class="row time-field">
          <div class="field">
            <label>Start time *</label>
            <input type="time" id="time" />
            <div class="field-error" id="time-error"></div>
          </div>
          <div class="field">
            <label>End time (optional)</label>
            <input type="time" id="end_time" />
          </div>
        </div>

        <div class="field">
          <label>Location *</label>
          <input type="text" id="location" placeholder="Exact address" />
          <div class="field-error" id="location-error"></div>
        </div>

        <div class="field">
          <label>Event link *</label>
          <input type="text" id="link" placeholder="https://..." />
          <div class="field-error" id="link-error"></div>
        </div>

        <div class="field">
          <label>Is it free? *</label>
          <div class="radio-group">
            <label class="radio-label">
              <input type="radio" name="free" value="yes" />
              <span class="radio-box"></span>
              Yes, free
            </label>
            <label class="radio-label">
              <input type="radio" name="free" value="no" />
              <span class="radio-box"></span>
              No, paid
            </label>
          </div>
          <div class="field-error" id="free-error"></div>
        </div>

        <div class="field">
          <label>Signup required? *</label>
          <div class="radio-group">
            <label class="radio-label">
              <input type="radio" name="signup" value="yes" />
              <span class="radio-box"></span>
              Yes
            </label>
            <label class="radio-label">
              <input type="radio" name="signup" value="no" />
              <span class="radio-box"></span>
              No
            </label>
          </div>
          <div class="field-error" id="signup-error"></div>
        </div>

        <div class="field">
          <label>Your email *</label>
          <input type="text" id="submitter_email" placeholder="your@email.com" />
          <div class="field-error" id="submitter_email-error"></div>
          <div class="field-hint">We'll only use this to confirm your submission. We won't publish it.</div>
        </div>

        <button type="submit" class="submit-btn" id="submitBtn">Submit event</button>
        <div class="success-msg" id="successMsg"></div>
        <div class="error-msg" id="errorMsg"></div>
      </form>
    </div>
  </main>

  <script src="submit.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>hiddenHEL</title>
  <link rel="icon" type="image/png" href="media/favicon.png">
  <link rel="apple-touch-icon" href="media/apple-touch-icon.png">
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.Default.css"/>
  <link rel="stylesheet" href="shared.css">
  <link rel="stylesheet" href="style.css">

  <!-- Privacy-friendly analytics by Plausible -->
  <script async src="https://plausible.io/js/pa-c7kXuP-SRAc8oWnlVa2xN.js"></script>
  <script>
    window.plausible=window.plausible||function(){(plausible.q=plausible.q||[]).push(arguments)},plausible.init=plausible.init||function(i){plausible.o=i||{}};
    plausible.init()
  </script>

</head>
<body>

  <div id="welcome-overlay">
    <button class="overlay-close" onclick="closeOverlay()">✕</button>
    <img src="media/logo2.png" alt="hiddenHEL" class="overlay-logo" />
    <h1 class="overlay-headline">Find local gems and moments worth meeting for</h1>
    <p class="overlay-types">Updated weekly, so you always know what the HEL’s going on.</p>
    <button class="overlay-btn" onclick="closeOverlay()">Explore the map</button>
  </div>

  <header>
    <a class="logo" href="/"><img src="media/logo2.png" alt="hiddenHEL" /></a></a>
    <a href="/submit" class="submit-event-btn">Submit an event</a>
  </header>

  <div class="filters">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="today">Today</button>
    <button class="filter-btn" data-filter="tomorrow">Tomorrow</button>
    <button class="filter-btn" data-filter="week">This week</button>
  </div>

  <div class="layout" id="layout">
    <div class="list-panel" id="list-panel"></div>
    <div id="map"></div>
  </div>

  <div class="view-toggle">
    <button class="toggle-btn active" data-view="map">Map</button>
    <button class="toggle-btn" data-view="list">List</button>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/leaflet.markercluster.js"></script>
  <script src="main.js"></script>

</body>
</html>
